<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>皮克敏群組小幫手</title>
    <style>
      /* 專門用來測試透明去背的灰白棋盤格背景 */
      .test-transparency {
        background-image:
          linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
          linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
          linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        background-color: white;
        padding: 20px;
        text-align: center;
        border-bottom: 2px dashed #999;
      }
      .test-transparency img {
        max-width: 250px;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); /* 加上陰影讓去背邊緣更明顯 */
      }
      .test-transparency p {
        font-family: sans-serif;
        color: #666;
        font-weight: bold;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <!-- 🧪 去背測試區：上線後如果覺得礙眼，可以直接把這個 div 刪掉 -->
    <div class="test-transparency">
      <p>🧪 去背測試區 (如果成功，皮克敏後面會透出棋盤格)</p>
      <!-- 這裡呼叫你的 public/recruit.png 進行測試 -->
      <img src="/recruit.png" alt="測試圖片" />
    </div>

    <!-- React LIFF 應用程式的掛載點 -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
